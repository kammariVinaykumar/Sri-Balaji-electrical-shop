        // ==========================================================

        function App() {

            // Fetch stored settings or fall back to defaults
            const [settings, setSettings] = useState(() => {
                const stored = localStorage.getItem('sri_balaji_settings');
                return stored ? JSON.parse(stored) : INITIAL_SETTINGS;
            });

            // Fetch stored products
            const [products, setProducts] = useState(() => {
                const stored = localStorage.getItem('sri_balaji_products');
                return stored ? JSON.parse(stored) : INITIAL_PRODUCTS;
            });

            // Fetch stored gallery list
            const [gallery, setGallery] = useState(() => {
                const stored = localStorage.getItem('sri_balaji_gallery');

            // Fetch stored user enquiries
            const [enquiries, setEnquiries] = useState(() => {
                const stored = localStorage.getItem('sri_balaji_enquiries');
                return stored ? JSON.parse(stored) : [];
            });

            // Administrative Session State
            const [adminPasswordInput, setAdminPasswordInput] = useState('');
            const [adminLoggedIn, setAdminLoggedIn] = useState(() => {
                return localStorage.getItem('sri_balaji_admin_auth') === 'true';
            });

            // Search Filter Constraints
            const [productSearch, setProductSearch] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('All');
            const [prefilledEnquiry, setPrefilledEnquiry] = useState(null);

            // Modals structure
            const [productForm, setProductForm] = useState(null); // { mode: 'add'|'edit', data: ... }
            const [galleryForm, setGalleryForm] = useState(null); // { mode: 'add'|'edit', data: ... }
            const [settingsForm, setSettingsForm] = useState(null);

            // Toast feedback alerts
            const [toasts, setToasts] = useState([]);
            const addToast = (message, type = 'success') => {
                const id = Date.now().toString();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => {
                    setToasts(prev => prev.filter(t => t.id !== id));
                }, 4000);
            };

            // Sync state helpers to browser LocalStorage (Ensures 100% stable live preview fallback)
            const saveProducts = (updated) => {
                setProducts(updated);
                localStorage.setItem('sri_balaji_products', JSON.stringify(updated));
            };

            const saveGallery = (updated) => {
                setGallery(updated);
                localStorage.setItem('sri_balaji_gallery', JSON.stringify(updated));
            };

            const saveSettings = (updated) => {
                setSettings(updated);
                localStorage.setItem('sri_balaji_settings', JSON.stringify(updated));
            };

            const saveEnquiries = (updated) => {
                setEnquiries(updated);
                localStorage.setItem('sri_balaji_enquiries', JSON.stringify(updated));
            };

            // ==========================================================
            // SYNC REAL-TIME DATA TO CLOUD VIA COMPAT SDK
            // ==========================================================
            useEffect(() => {
                // Ensure auth listener runs safely first
                const unsubAuth = auth.onAuthStateChanged((user) => {
                    if (!user) {
                        auth.signInAnonymously().catch(e => console.warn("Firebase Auth blocked:", e));
                    }
                });

                // Sync Settings collection
                const settingsDocRef = db.doc(`artifacts/${appId}/public/data/settings/config`);
                const unsubSettings = settingsDocRef.onSnapshot((snap) => {
                    if (snap.exists) {
                        setSettings(snap.data());
                    } else {
                        settingsDocRef.set(INITIAL_SETTINGS).catch(e => console.warn("Cloud write failed: fallback local"));
                    }

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8 pb-12 border-b border-slate-900">
                                <div className="space-y-4">
                                    <h4 className="text-xl font-extrabold text-white">{settings.shopName}</h4>
                                    <p className="text-xs text-slate-400">Certified quality switches, heavy duty conduits, modular sockets, and household electrical fittings.</p>
                                </div>
                                <div className="space-y-2 text-xs">
                                    <h5 className="font-bold text-white uppercase tracking-widest">Directions</h5>
                                    <button onClick={() => setCurrentPage('home')} className="block hover:text-orange-400">Home</button>
                                    <button onClick={() => setCurrentPage('products')} className="block hover:text-orange-400">Products Catalogue</button>
                                    <button onClick={() => setCurrentPage('gallery')} className="block hover:text-orange-400">Shop Showcase</button>
                                </div>
                                <div className="space-y-2 text-xs">
                                    <h5 className="font-bold text-white uppercase tracking-widest">Admin</h5>
                                    <button onClick={() => setCurrentPage('admin')} className="hover:text-orange-400 flex items-center justify-center sm:justify-start space-x-1">
                                        <Icon name="Lock" className="w-3.5 h-3.5 text-orange-500" />
                                        <span>Secure Login</span>
                                    </button>
                                </div>
                            </div>
                            <p className="pt-8 text-center text-xs text-slate-600">© 2026 {settings.shopName}. All Rights Reserved.</p>
                        </div>
                    </footer>

                    {/* FLOATING ACTION UTILITY BADGES */}
                    <div className="fixed bottom-6 right-6 z-40 flex flex-col space-y-3">
                        <a href={`tel:${settings.phone}`} className="bg-blue-600 hover:bg-blue-500 text-white p-4 rounded-full shadow-2xl flex items-center justify-center">
                            <Icon name="Phone" className="w-5 h-5" />
                        </a>
                        <a href={`https://wa.me/91${settings.whatsapp}?text=Hello%20Balaji%20Electricals`} target="_blank" rel="noopener noreferrer" className="bg-emerald-600 hover:bg-emerald-500 text-white p-4 rounded-full shadow-2xl flex items-center justify-center">
                            <Icon name="MessageSquare" className="w-5 h-5" />
                        </a>
                    </div>

                    {}
                    {/* TOAST ALERTS */}
                    <div className="fixed top-5 right-5 z-50 flex flex-col space-y-2 max-w-sm w-full">
                        {toasts.map((toast) => (
                            <div key={toast.id} className={`p-4 rounded-xl shadow-2xl border flex items-start justify-between animate-slideIn ${
                                toast.type === 'success' ? 'bg-emerald-900 text-emerald-100 border-emerald-700/50' : 'bg-rose-900 text-rose-100 border-rose-700/50'
                            }`}>
                                <span className="text-xs font-bold">{toast.message}</span>
                                <button onClick={() => setToasts(prev => prev.filter(t => t.id !== toast.id))} className="text-white/70 hover:text-white ml-4">
                                    <Icon name="X" className="w-4 h-4" />
                                </button>
                            </div>
                        ))}
                    </div>

                    {}
                    {/* CRUD MODALS */}
                    {productForm && (
                        <div className="fixed inset-0 z-50 bg-slate-950/70 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl w-full max-w-2xl overflow-hidden border border-slate-200 shadow-2xl animate-scaleUp">
                                <div className="bg-slate-900 p-6 text-white flex justify-between items-center">
                                    <h3 className="text-xl font-bold">{productForm.mode === 'edit' ? 'Edit Existing Product' : 'Add New Product'}</h3>
                                    <button onClick={() => setProductForm(null)} className="p-1.5 hover:bg-slate-800 rounded-lg">
                                        <Icon name="X" className="w-5 h-5" />
                                    </button>
                                </div>
                                <form 
                                    onSubmit={(e) => {
                                        e.preventDefault();
                                        const fd = new FormData(e.target);
                                        handleSaveProduct({
                                            name: fd.get('name'),
                                            description: fd.get('description'),
                                            category: fd.get('category'),
                                            price: parseFloat(fd.get('price')),
                                            availability: fd.get('availability'),
                                            image: fd.get('image') || "https://images.unsplash.com/photo-1558346490-a72e53ae2d4f?auto=format&fit=crop&w=500&q=80"
                                        });
                                    }}
                                    className="p-6 space-y-4 max-h-[75vh] overflow-y-auto"
                                >
                                    <div>
                                        <label className="block text-xs font-bold text-slate-700 uppercase mb-1">Product Title / Brand Name *</label>
                                        <input type="text" name="name" required defaultValue={productForm.data.name || ''} className="w-full px-3 py-2 bg-slate-50 border rounded-lg text-sm" />
                                    </div>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-bold text-slate-700 uppercase mb-1">Category Group *</label>
                                            <select name="category" defaultValue={productForm.data.category || CATEGORIES[0]} className="w-full px-3 py-2 bg-slate-50 border rounded-lg text-sm font-semibold">
                                                {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-slate-700 uppercase mb-1">Price (₹ INR) *</label>
                                            <input type="number" name="price" required defaultValue={productForm.data.price || ''} className="w-full px-3 py-2 bg-slate-50 border rounded-lg text-sm" />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-700 uppercase mb-1">Description</label>
                                        <textarea name="description" rows="3" defaultValue={productForm.data.description || ''} className="w-full px-3 py-2 bg-slate-50 border rounded-lg text-sm"></textarea>
                                    </div>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-bold text-slate-700 uppercase mb-1">Stock Availability *</label>
                                            <select name="availability" defaultValue={productForm.data.availability || 'In Stock'} className="w-full px-3 py-2 bg-slate-50 border rounded-lg text-sm font-semibold">
                                                <option value="In Stock">In Stock</option>
                                                <option value="Out of Stock">Out of Stock</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-slate-700 uppercase mb-1">Image URL Address</label>
                                            <input type="text" name="image" defaultValue={productForm.data.image || ''} placeholder="https://..." className="w-full px-3 py-2 bg-slate-50 border rounded-lg text-sm" />
                                        </div>
                                    </div>
                                    <div className="pt-4 border-t flex justify-end space-x-2">
                                        <button type="button" onClick={() => setProductForm(null)} className="px-4 py-2 border rounded-lg text-slate-600 hover:bg-slate-100 text-sm">Cancel</button>
                                        <button type="submit" className="px-6 py-2 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-lg text-sm">Save Product</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {galleryForm && (
                        <div className="fixed inset-0 z-50 bg-slate-950/70 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl w-full max-w-md overflow-hidden border border-slate-200 shadow-2xl animate-scaleUp">
                                <div className="bg-slate-900 p-6 text-white flex justify-between items-center">
                                    <h3 className="text-xl font-bold">{galleryForm.mode === 'edit' ? 'Modify Showcase' : 'Add Photo'}</h3>
                                    <button onClick={() => setGalleryForm(null)} className="p-1.5 hover:bg-slate-800 rounded-lg">
                                        <Icon name="X" className="w-5 h-5" />
                                    </button>
                                </div>
                                <form 
                                    onSubmit={(e) => {
                                        e.preventDefault();
                                        const fd = new FormData(e.target);
                                        handleSaveGalleryItem({
                                            caption: fd.get('caption'),
                                            image: fd.get('image') || "https://images.unsplash.com/photo-1513694203232-719a280e022f?auto=format&fit=crop&w=800&q=80"
                                        });
                                    }}
                                    className="p-6 space-y-4"
                                >
                                    <div>
                                        <label className="block text-xs font-bold text-slate-700 uppercase mb-1">Image Caption *</label>
                                        <input type="text" name="caption" required defaultValue={galleryForm.data.caption || ''} className="w-full px-3 py-2 bg-slate-50 border rounded-lg text-sm" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-700 uppercase mb-1">Image URL Address</label>
                                        <input type="text" name="image" defaultValue={galleryForm.data.image || ''} placeholder="https://..." className="w-full px-3 py-2 bg-slate-50 border rounded-lg text-sm" />
                                    </div>
                                    <div className="pt-4 border-t flex justify-end space-x-2">
                                        <button type="button" onClick={() => setGalleryForm(null)} className="px-4 py-2 border rounded-lg text-slate-600 hover:bg-slate-100 text-sm">Cancel</button>
                                        <button type="submit" className="px-6 py-2 bg-emerald-600 hover:bg-emerald-500 text-white font-bold rounded-lg text-sm">Save Photo</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {settingsForm && (
                        <div className="fixed inset-0 z-50 bg-slate-950/70 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl w-full max-w-lg overflow-hidden border border-slate-200 shadow-2xl animate-scaleUp">
                                <div className="bg-slate-900 p-6 text-white flex justify-between items-center">
                                    <h3 className="text-xl font-bold flex items-center space-x-2">
                                        <Icon name="Settings" className="w-5 h-5 text-orange-500" />
                                        <span>Adjust Shop Settings</span>
                                    </h3>
                                    <button onClick={() => setSettingsForm(null)} className="p-1.5 hover:bg-slate-800 rounded-lg">
                                        <Icon name="X" className="w-5 h-5" />
                                    </button>
                                </div>
                                <form 
                                    onSubmit={(e) => {
                                        e.preventDefault();
                                        const fd = new FormData(e.target);
                                        handleUpdateSettings({
                                            shopName: fd.get('shopName'),
                                            phone: fd.get('phone'),
                                            whatsapp: fd.get('whatsapp'),
                                            address: fd.get('address'),
                                            hours: fd.get('hours'),
                                            heroBannerUrl: fd.get('heroBannerUrl'),
                                            logoUrl: settings.logoUrl
                                        });
                                    }}
                                    className="p-6 space-y-4 max-h-[70vh] overflow-y-auto"
                                >
                                    <div>
                                        <label className="block text-xs font-bold text-slate-700 uppercase mb-1">Shop Name</label>
                                        <input type="text" name="shopName" required defaultValue={settingsForm.shopName} className="w-full px-3 py-2 bg-slate-50 border rounded-lg text-sm font-semibold" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-bold text-slate-700 uppercase mb-1">Phone Number</label>
                                            <input type="text" name="phone" required defaultValue={settingsForm.phone} className="w-full px-3 py-2 bg-slate-50 border rounded-lg text-sm" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-slate-700 uppercase mb-1">WhatsApp Support</label>
                                            <input type="text" name="whatsapp" required defaultValue={settingsForm.whatsapp} className="w-full px-3 py-2 bg-slate-50 border rounded-lg text-sm" />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-700 uppercase mb-1">Hero Banner URL</label>
                                        <input type="text" name="heroBannerUrl" defaultValue={settingsForm.heroBannerUrl} className="w-full px-3 py-2 bg-slate-50 border rounded-lg text-sm" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-700 uppercase mb-1">Physical Address</label>
                                        <input type="text" name="address" defaultValue={settingsForm.address} className="w-full px-3 py-2 bg-slate-50 border rounded-lg text-sm" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-700 uppercase mb-1">Business Hours</label>
                                        <input type="text" name="hours" defaultValue={settingsForm.hours} className="w-full px-3 py-2 bg-slate-50 border rounded-lg text-sm" />
                                    </div>
                                    <div className="pt-4 border-t flex justify-end space-x-2">
                                        <button type="button" onClick={() => setSettingsForm(null)} className="px-4 py-2 border rounded-lg text-slate-600 hover:bg-slate-100 text-sm">Cancel</button>
                                        <button type="submit" className="px-6 py-2 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-lg text-sm">Save Settings</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        // ==========================================================
        // MOUNTING APP ROOT ELEMENT
        // ==========================================================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
